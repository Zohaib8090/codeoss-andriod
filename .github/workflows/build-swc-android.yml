name: Build SWC for Android ARM64

on:
  workflow_dispatch:
  push:
    branches:
      - android-swc-build

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout Next.js
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: v16.1.6
          fetch-depth: 0

      # ── Rust ──────────────────────────────────────────────────────────────
      # Next.js v16 uses nightly Rust features (e.g. tokio's disable_lifo_slot).
      # DO NOT use dtolnay/rust-toolchain@stable — it overrides rust-toolchain.toml.
      # Instead, run `rustup show` which reads the repo's rust-toolchain.toml and
      # installs the exact pinned nightly toolchain Vercel uses to build SWC.
      - name: Setup Rust from repo rust-toolchain.toml (nightly pinned)
        run: |
          echo "=== rust-toolchain.toml ==="
          cat rust-toolchain.toml 2>/dev/null || cat rust-toolchain 2>/dev/null || echo "(no toolchain file found)"
          # This triggers automatic install of the pinned toolchain
          rustup show
          echo "Active toolchain: $(rustup show active-toolchain)"

      - name: Add Android ARM64 target to active toolchain
        run: |
          TOOLCHAIN=$(rustup show active-toolchain | awk '{print $1}')
          echo "Adding aarch64-linux-android to toolchain: $TOOLCHAIN"
          rustup target add aarch64-linux-android --toolchain "$TOOLCHAIN"
          rustup target list --installed

      # ── Android NDK ───────────────────────────────────────────────────────
      # NDK r27 ships clang 18 and supports API 24+ (Android 7+).
      # API level 24 is our minimum — matches the app/build.gradle.kts minSdk.
      - name: Setup Android NDK r27
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: true

      # ── Node / npm ────────────────────────────────────────────────────────
      # Node 22 LTS is only used for the build tooling (@napi-rs/cli).
      # The resulting .node binary is NAPI ABI-stable and works with any
      # Node version that supports the NAPI level compiled into the binary.
      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler binutils-aarch64-linux-gnu

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@2.18.4

      # ── Patch Cargo.toml to target NAPI v9 (highest stable, ABI-compatible
      #    with Node 22–25). napi-rs NAPI level is set via Cargo features,
      #    NOT via a CLI flag. The binary is ABI-stable — a NAPI 9 binary runs
      #    on any Node.js that supports NAPI 9+, including Node 25.
      # ─────────────────────────────────────────────────────────────────────
      - name: Verify napi crate feature level in Cargo.toml
        run: |
          echo "=== napi dependency in Cargo.toml ==="
          grep -A5 'napi' Cargo.toml | head -40 || true
          echo "=== napi dependency in packages/next-swc/Cargo.toml ==="
          grep -A5 'napi' packages/next-swc/Cargo.toml | head -40 || true

      # ── Patch .cargo/config.toml for Android build ────────────────────────
      # WHY: Setting RUSTFLAGS env var completely OVERRIDES rustflags in
      # .cargo/config.toml. Next.js already sets --cfg tokio_unstable there
      # (required for tokio's disable_lifo_slot API). Instead of fighting env vars,
      # we patch the cargo config directly to ADD the Android linker flag.
      # This preserves the existing --cfg tokio_unstable and adds --hash-style=gnu.
      - name: Patch .cargo/config.toml for Android linker flags
        run: |
          echo "=== Original .cargo/config.toml ==="
          cat .cargo/config.toml 2>/dev/null || echo "(no .cargo/config.toml)"

          # Append Android-specific target rustflags.
          # The [build] section already has --cfg tokio_unstable.
          # We add a [target.aarch64-linux-android] section for the linker flag.
          cat >> .cargo/config.toml << 'EOF'

          [target.aarch64-linux-android]
          rustflags = [
            "-C", "link-arg=-Wl,--hash-style=gnu"
          ]
          EOF

          echo ""
          echo "=== Patched .cargo/config.toml ==="
          cat .cargo/config.toml

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build next-swc-napi for aarch64-linux-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_TOOLCHAIN: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          # CC / CXX / AR / LINKER for the cross-compilation target
          CC_aarch64_linux_android:     ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CXX_aarch64_linux_android:    ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++
          AR_aarch64_linux_android:     ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android: >-
            --sysroot=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          # Suppress OpenSSL/OTEL noise during compilation
          OPENSSL_NO_VENDOR: 1
          NEXT_TELEMETRY_DISABLED: 1
          # NOTE: We do NOT set RUSTFLAGS here — that would override .cargo/config.toml
          # and silently drop --cfg tokio_unstable (needed for disable_lifo_slot).
          # The --hash-style=gnu linker flag is set via .cargo/config.toml above.
        run: |
          cd packages/next-swc
          napi build \
            --release \
            --target aarch64-linux-android \
            -p next-swc-napi \
            --cargo-cwd ../../ \
            --cargo-name next_swc_napi \
            --features plugin,image-extended,tracing/release_max_level_trace \
            --js false \
            native


      # ── Post-build: inspect raw binary ────────────────────────────────────
      - name: Inspect raw binary (pre-patch)
        run: |
          RAW=$(ls packages/next-swc/native/*.node | head -1)
          echo "=== Raw binary: $RAW ==="
          file "$RAW"
          # Show current RUNPATH (should contain /data/data/com.termux/ or be empty)
          readelf -d "$RAW" | grep -E 'RUNPATH|RPATH|NEEDED' || true

      # ── Post-build: inspect and VERIFY binary ELF integrity ──────────────
      # We DO NOT run patchelf or any hex-patcher on this binary.
      #
      # WHY: This binary is compiled from scratch by Android NDK (not Termux),
      # so it has NO Termux RUNPATH that needs replacing.
      # patchelf --set-rpath is known to corrupt DT_GNU_HASH when it restructures
      # ELF sections that don't have enough padding.
      # Android's linker rejects binaries with missing/corrupt DT_GNU_HASH with:
      #   "dlopen failed: empty/missing DT_HASH/DT_GNU_HASH"
      #
      # Runtime deps are resolved at dlopen() time via LD_LIBRARY_PATH set
      # in the node/git wrapper scripts in init.sh — no RUNPATH needed.
      - name: Inspect and verify binary ELF integrity (no patching)
        run: |
          RAW=$(ls packages/next-swc/native/*.node | head -1)
          echo "=== Binary: $RAW ==="
          file "$RAW"
          ls -lh "$RAW"
          echo ""
          echo "=== ELF Dynamic section (RUNPATH/RPATH/NEEDED) ==="
          readelf -d "$RAW" | grep -E 'RUNPATH|RPATH|NEEDED' || echo "(no RUNPATH/RPATH entries)"
          echo ""
          echo "=== Verifying DT_HASH / DT_GNU_HASH (REQUIRED by Android linker) ==="
          if readelf -d "$RAW" | grep -qE '0x000000006ffffef5|0x000000006ffffff6|DT_GNU_HASH|DT_HASH'; then
            echo "OK: Hash section found — binary is Android-linker compatible."
          else
            echo "WARNING: No DT_HASH or DT_GNU_HASH found!"
            echo "Build flags may need -Wl,--hash-style=both"
            exit 1
          fi


      # ── Rename & prepare artifacts ────────────────────────────────────────
      # Android's PackageManager only extracts lib*.so files from jniLibs/.
      # The .node extension is not recognized. We rename to libnext_swc.so so
      # Android extracts it to /data/app/~~hash==/lib/arm64/libnext_swc.so,
      # which is the path PtyBridge.kt reads via applicationInfo.nativeLibraryDir.
      - name: Rename and prepare artifacts
        run: |
          RAW=$(ls packages/next-swc/native/*.node | head -1)
          mkdir -p output

          # Primary artifact: renamed for jniLibs
          cp "$RAW" output/libnext_swc.so
          echo "jniLibs artifact:  output/libnext_swc.so"

          # Secondary artifact: keep original name for debugging / manual loading
          cp "$RAW" "output/next-swc.android-arm64.node"
          echo "Debug artifact:    output/next-swc.android-arm64.node"

          # Print final sizes
          ls -lh output/

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload libnext_swc.so (for jniLibs)
        uses: actions/upload-artifact@v4
        with:
          name: libnext_swc-android-arm64
          path: output/libnext_swc.so
          # Keep for 90 days
          retention-days: 90

      - name: Upload next-swc.android-arm64.node (debug copy)
        uses: actions/upload-artifact@v4
        with:
          name: next-swc-android-arm64-node
          path: output/next-swc.android-arm64.node
          retention-days: 90
